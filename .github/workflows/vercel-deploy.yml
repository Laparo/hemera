name: Deploy - Vercel

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      CI_CREATE_ISSUES: ${{ vars.CI_CREATE_ISSUES }}
    outputs:
      preview_url: ${{ steps.deploy_preview.outputs.preview_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel environment (preview)
        run: |
          vercel pull --yes --environment=preview --token "$VERCEL_TOKEN"

      - name: Build (preview)
        run: |
          set -e
          vercel build --token "$VERCEL_TOKEN"

      - name: Deploy (preview)
        id: deploy_preview
        run: |
          set -e
          URL=$(vercel deploy --prebuilt --token "$VERCEL_TOKEN")
          echo "preview_url=$URL" >> $GITHUB_OUTPUT

      - name: Create issue on failure (preview)
        if: failure() && env.CI_CREATE_ISSUES == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = `vercel: Preview Deployment fehlgeschlagen (${process.env.GITHUB_SHA?.slice(0,7)})`;
            const body = `Automatisch erstellt, da der Vercel Preview Deploy in CI fehlgeschlagen ist.\n\nBranch: ${process.env.GITHUB_REF}\nWorkflow: ${process.env.GITHUB_WORKFLOW}\nRun: ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['type:bug', 'status:triage']
            });

      - name: Comment preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy_preview.outputs.preview_url }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const url = process.env.PREVIEW_URL;
            const body = `Vercel Preview Deployment: ${url}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  lighthouse:
    needs: deploy-preview
    if: github.event_name == 'pull_request' && needs.deploy-preview.outputs.preview_url != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Lighthouse CI
        run: npm i -g @lhci/cli

      - name: Run Lighthouse CI (collect)
        run: |
          lhci collect --url "${{ needs.deploy-preview.outputs.preview_url }}" --config=.lighthouserc.json

      - name: Generate HTML report
        run: |
          lhci upload --target=filesystem --outputDir=./lhci-report

      - name: Upload Lighthouse report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: ./lhci-report

      - name: Summarize Lighthouse results
        if: always()
        id: summarize
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const cp = require('child_process');
            const files = cp.execSync('ls -t .lighthouseci/*.json').toString().trim().split('\n');
            const file = files[0];
            const lhr = JSON.parse(fs.readFileSync(file, 'utf8'));
            const pct = s => Math.round(((s?.score) ?? 0) * 100);
            const c = lhr.categories;
            const perf = pct(c.performance);
            const acc = pct(c.accessibility);
            const bp = pct(c['best-practices'] ?? c["best-practices"]);
            const seo = pct(c.seo);
            const url = lhr.requestedUrl;
            const body = [
              `### 🌟 Lighthouse Report`,
              `URL: ${url}`,
              ``,
              `- Performance: ${perf}`,
              `- Accessibility: ${acc}`,
              `- Best-Practices: ${bp}`,
              `- SEO: ${seo}`,
            ].join('\n');
            core.setOutput('comment', body);

      - name: Post sticky PR comment with Lighthouse summary
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: lighthouse-ci
          message: ${{ steps.summarize.outputs.comment }}

  e2e:
    needs: deploy-preview
    if: github.event_name == 'pull_request' && needs.deploy-preview.outputs.preview_url != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests against preview
        id: e2e
        continue-on-error: true
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy-preview.outputs.preview_url }}
        run: npm run e2e:dev

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: warn

      - name: Comment E2E result on PR
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          BASE_URL: ${{ needs.deploy-preview.outputs.preview_url }}
          OUTCOME: ${{ steps.e2e.outcome }}
        with:
          script: |
            const bodyMarker = '<!-- hemera-e2e-result -->';
            const outcome = process.env.OUTCOME || 'unknown';
            const base = process.env.BASE_URL || '';
            const emoji = outcome === 'success' ? '✅' : (outcome === 'failure' ? '❌' : 'ℹ️');
            const body = `${bodyMarker}\n${emoji} E2E (${outcome}) against ${base}.\n` +
              `Artifacts: see 'playwright-report' in the Actions run.`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request?.number;
            if (!issue_number) { core.warning('No PR number found for comment.'); return; }
            try {
              const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
              const existing = comments.find(c => (c.user?.type === 'Bot' || c.user?.login?.includes('[bot]')) && c.body?.includes(bodyMarker));
              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number, body });
              }
            } catch (error) {
              core.warning(`Could not comment on PR: ${error.message}`);
            }

      - name: Fail if tests failed
        if: ${{ steps.e2e.outcome == 'failure' }}
        run: |
          echo "E2E tests failed" >&2
          exit 1

  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      CI_CREATE_ISSUES: ${{ vars.CI_CREATE_ISSUES }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel environment (production)
        run: |
          vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build (production)
        run: |
          set -e
          vercel build --prod --token "$VERCEL_TOKEN"

      - name: Deploy (production)
        run: |
          set -e
          vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"

      - name: Create issue on failure (production)
        if: failure() && env.CI_CREATE_ISSUES == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = `vercel: Production Deployment fehlgeschlagen (${process.env.GITHUB_SHA?.slice(0,7)})`;
            const body = `Automatisch erstellt, da der Vercel Production Deploy in CI fehlgeschlagen ist.\n\nBranch: ${process.env.GITHUB_REF}\nWorkflow: ${process.env.GITHUB_WORKFLOW}\nRun: ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['type:bug', 'status:triage']
            });
